version: 2

project_name: idxlens

builds:
  - main: ./cmd/idxlens
    binary: idxlens
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/internal/cli.version={{ .Version }}'
      - -X '{{ .ModulePath }}/internal/cli.commit={{ .ShortCommit }}'
      - -X '{{ .ModulePath }}/internal/cli.date={{ .Date }}'

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  abbrev: -1
  # Strip commit type prefix from entries since groups already categorize them.
  # goreleaser (free) lacks regex replace and capitalize functions, so we use
  # simple replace calls for each known prefix. Capitalisation of the first
  # letter is not supported natively — a goreleaser limitation.
  format: >-
    {{ .Message
    | replace "feat: " ""
    | replace "fix: " ""
    | replace "refactor: " ""
    | replace "build: " ""
    | replace "ci: " ""
    | replace "docs: " ""
    | replace "test: " ""
    | replace "chore: " ""
    | replace "revert: " ""
    }}
  groups:
    - title: "Features"
      regexp: '^feat:'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix:'
      order: 1
    - title: "Refactoring"
      regexp: '^refactor:'
      order: 2
    - title: "Build & CI"
      regexp: '^(build|ci):'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^Initial commit$'
