version: 2

builds:
  - main: ./cmd/idxlens
    binary: idxlens
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/internal/cli.Version={{ .Version }}'
      - -X '{{ .ModulePath }}/internal/cli.Commit={{ .ShortCommit }}'
      - -X '{{ .ModulePath }}/internal/cli.Date={{ .Date }}'

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
