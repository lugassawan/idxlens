<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D1E8F8"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- Document -->
  <rect x="16" y="10" width="52" height="68" rx="4" fill="url(#docGrad)" stroke="#90CAF9" stroke-width="2"/>

  <!-- Document lines -->
  <rect x="24" y="20" width="36" height="3" rx="1.5" fill="#90CAF9"/>
  <rect x="24" y="28" width="28" height="3" rx="1.5" fill="#90CAF9"/>
  <rect x="24" y="36" width="32" height="3" rx="1.5" fill="#90CAF9"/>

  <!-- Bar chart on document -->
  <rect x="26" y="58" width="6" height="14" rx="1" fill="url(#chartGrad)"/>
  <rect x="35" y="52" width="6" height="20" rx="1" fill="url(#chartGrad)"/>
  <rect x="44" y="46" width="6" height="26" rx="1" fill="url(#chartGrad)"/>
  <rect x="53" y="50" width="6" height="22" rx="1" fill="url(#chartGrad)"/>

  <!-- Magnifying glass circle -->
  <circle cx="72" cy="62" r="26" fill="none" stroke="url(#lensGrad)" stroke-width="5" opacity="0.9"/>
  <circle cx="72" cy="62" r="22" fill="white" fill-opacity="0.15"/>

  <!-- Magnifying glass handle -->
  <line x1="91" y1="81" x2="108" y2="98" stroke="url(#lensGrad)" stroke-width="6" stroke-linecap="round"/>
</svg>
