name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint (custom-gcl + tidygo)
        if: matrix.os == 'ubuntu-latest'
        run: make lint

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build -o bin/idxlens ./cmd/idxlens

      - name: Verify binary size (< 20MB)
        if: matrix.os != 'windows-latest'
        run: |
          size=$(stat -f%z bin/idxlens 2>/dev/null || stat -c%s bin/idxlens)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 20971520 ]; then
            echo "ERROR: binary exceeds 20MB"
            exit 1
          fi
