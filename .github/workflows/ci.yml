name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.custom-gcl.yml'
              - '.golangci.yml'
              - 'dictionaries/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint (custom-gcl + tidygo)
        run: make lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Test
        run: go test -race ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out $(go list ./... | grep -v /bindings/)

      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=85
          if awk "BEGIN {exit ($total >= $threshold) ? 0 : 1}"; then :; else
            echo "ERROR: coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi
          echo "Coverage OK: ${total}% >= ${threshold}%"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build
        run: go build -o bin/idxlens ./cmd/idxlens

      - name: Verify binary size (< 25MB)
        run: |
          size=$(stat -c%s bin/idxlens)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 26214400 ]; then
            echo "ERROR: binary exceeds 25MB"
            exit 1
          fi

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [changes, lint, test, coverage, build]
    if: always()
    steps:
      - name: Check upstream results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          results="$CHANGES_RESULT $LINT_RESULT $TEST_RESULT $COVERAGE_RESULT $BUILD_RESULT"
          echo "Upstream results: $results"
          for result in $results; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "ERROR: upstream job returned '$result'"
              exit 1
            fi
          done
          echo "All upstream jobs passed or were skipped"
